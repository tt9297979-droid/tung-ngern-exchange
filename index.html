<!DOCTYPE html>
<html>
<head>
<title>ถุงเงิน Exchange</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
width:350px;
margin:auto;
margin-top:60px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:5px;
}

button{
background:#22c55e;
border:none;
padding:10px;
width:100%;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<h1>ถุงเงิน Exchange</h1>
<p>แลกเงินออนไลน์</p>

<div class="box">

<select id="from">
<option>THB</option>
<option>USD</option>
<option>EUR</option>
<option>JPY</option>
</select>

<select id="to">
<option>USD</option>
<option>THB</option>
<option>EUR</option>
<option>JPY</option>
</select>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="convert()">คำนวณ</button>

<p id="result"></p>

</div>

<script>

async function convert(){

let amount=document.getElementById("amount").value
let from=document.getElementById("from").value
let to=document.getElementById("to").value

let res=await fetch(
"https://api.exchangerate-api.com/v4/latest/"+from
)

let data=await res.json()

let rate=data.rates[to]

let total=amount*rate

document.getElementById("result").innerText=
"คุณจะได้รับ "+total+" "+to

}

</script>

</body>
</html>
