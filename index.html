<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<title>ถุงเงิน Exchange</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>💰 ถุงเงิน Exchange</h1>

<div class="box">

<h3>สร้าง QR ชำระเงิน</h3>

<input id="amount" placeholder="จำนวนเงิน">

<button onclick="createQR()">สร้าง QR</button>

<img id="qr">

</div>

<div class="box">

<h3>อัพโหลดสลิป</h3>

<input type="file" id="slip">

<button onclick="verifySlip()">ตรวจสอบสลิป</button>

<p id="result"></p>

</div>

<script src="config.js"></script>

<script src="app.js"></script>

</body>

</html>
